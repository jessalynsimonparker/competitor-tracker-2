<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Competitor LinkedIn Post Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      padding: 24px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 0.875rem;
      margin-bottom: 24px;
    }

    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      font-size: 0.8rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }

    .swatch-likes { background: #fff3cd; border: 1px solid #f0c040; }
    .swatch-flagged { background: #ede9fe; border: 1px solid #a78bfa; }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filters input, .filters select {
      padding: 7px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.875rem;
      background: #fff;
    }

    .filters input { width: 220px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      font-size: 0.875rem;
    }

    thead tr {
      background: #1e293b;
      color: #f1f5f9;
      text-align: left;
    }

    th {
      padding: 12px 14px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    th:hover { background: #334155; }

    th .sort-icon { font-size: 0.7rem; margin-left: 4px; opacity: 0.6; }

    td {
      padding: 11px 14px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: top;
    }

    tr:last-child td { border-bottom: none; }

    tr.likes-increased { background: #fff9e6; }
    tr.flagged { background: #ede9fe; }
    tr.likes-increased.flagged { background: #f3eeff; }

    .post-text {
      max-width: 340px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      color: #374151;
    }

    .post-text.expanded {
      white-space: normal;
      overflow: visible;
    }

    .wow-up { color: #16a34a; font-weight: 600; }
    .wow-down { color: #dc2626; }
    .wow-flat { color: #9ca3af; }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .tag-company {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .tag-new {
      background: #dcfce7;
      color: #15803d;
      margin-left: 6px;
    }

    a.linkedin-link {
      color: #2563eb;
      text-decoration: none;
      font-size: 0.8rem;
    }

    a.linkedin-link:hover { text-decoration: underline; }

    .btn-flag {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid #a78bfa;
      background: #f5f3ff;
      color: #6d28d9;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn-flag:hover { background: #ede9fe; }
    .btn-flag.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }

    .post-img {
      width: 72px;
      height: 52px;
      object-fit: cover;
      border-radius: 4px;
      display: block;
      cursor: zoom-in;
    }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 28px;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      user-select: none;
    }

    .empty { text-align: center; padding: 48px; color: #9ca3af; }

    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      font-size: 0.8rem;
      color: #6b7280;
    }

    .stats-bar span strong { color: #1a1a2e; }
  </style>
</head>
<body>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()">
</div>

<h1>Competitor LinkedIn Post Tracker</h1>
<p class="subtitle">30-day rolling window &bull; Week-over-week like tracking</p>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch swatch-likes"></div> Likes increased</div>
  <div class="legend-item"><div class="legend-swatch swatch-flagged"></div> Flagged for PhantomBuster</div>
</div>

<div class="stats-bar" id="stats"></div>

<div class="filters">
  <input type="text" id="search" placeholder="Search post text or company..." />
  <select id="filter-company">
    <option value="">All companies</option>
  </select>
  <select id="filter-flag">
    <option value="">All posts</option>
    <option value="flagged">Flagged only</option>
    <option value="increased">Likes increased</option>
  </select>
</div>

<table>
  <thead>
    <tr>
      <th data-col="company_name">Company <span class="sort-icon">⇅</span></th>
      <th>Image</th>
      <th data-col="post_text">Post Text</th>
      <th data-col="posted_date">Date Posted <span class="sort-icon">⇅</span></th>
      <th data-col="likes">Likes <span class="sort-icon">⇅</span></th>
      <th data-col="comments">Comments <span class="sort-icon">⇅</span></th>
      <th data-col="wow">Like Change <span class="sort-icon">⇅</span></th>
      <th>Link</th>
      <th>PhantomBuster</th>
    </tr>
  </thead>
  <tbody id="posts-body">
    <tr><td colspan="9" class="empty">Loading...</td></tr>
  </tbody>
</table>

<script>
  let allPosts = [];
  let sortCol = "posted_date";
  let sortDir = -1; // -1 = desc

  async function loadPosts() {
    const resp = await fetch("/api/posts");
    allPosts = await resp.json();
    populateCompanyFilter();
    renderStats();
    renderTable();
  }

  function populateCompanyFilter() {
    const sel = document.getElementById("filter-company");
    const companies = [...new Set(allPosts.map(p => p.company_name))].sort();
    companies.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c;
      opt.textContent = c;
      sel.appendChild(opt);
    });
  }

  function renderStats() {
    const total = allPosts.length;
    const increased = allPosts.filter(p => p.likes_increased).length;
    const flagged = allPosts.filter(p => p.flagged_for_phantombuster).length;
    document.getElementById("stats").innerHTML =
      `<span><strong>${total}</strong> posts</span>` +
      `<span><strong>${increased}</strong> with increased likes</span>` +
      `<span><strong>${flagged}</strong> flagged</span>`;
  }

  function getFiltered() {
    const search = document.getElementById("search").value.toLowerCase();
    const company = document.getElementById("filter-company").value;
    const flag = document.getElementById("filter-flag").value;

    return allPosts.filter(p => {
      if (search && !p.post_text?.toLowerCase().includes(search) && !p.company_name?.toLowerCase().includes(search)) return false;
      if (company && p.company_name !== company) return false;
      if (flag === "flagged" && !p.flagged_for_phantombuster) return false;
      if (flag === "increased" && !p.likes_increased) return false;
      return true;
    });
  }

  function getSorted(posts) {
    return [...posts].sort((a, b) => {
      let av = sortCol === "wow" ? ((a.likes || 0) - (a.prev_likes || 0)) : (a[sortCol] ?? "");
      let bv = sortCol === "wow" ? ((b.likes || 0) - (b.prev_likes || 0)) : (b[sortCol] ?? "");
      if (av < bv) return sortDir;
      if (av > bv) return -sortDir;
      return 0;
    });
  }

  function wowCell(post) {
    const delta = (post.likes || 0) - (post.prev_likes || 0);
    if (delta > 0) return `<span class="wow-up">+${delta}</span>`;
    if (delta < 0) return `<span class="wow-down">${delta}</span>`;
    return `<span class="wow-flat">—</span>`;
  }

  function renderTable() {
    const posts = getSorted(getFiltered());
    const tbody = document.getElementById("posts-body");

    if (!posts.length) {
      tbody.innerHTML = `<tr><td colspan="9" class="empty">No posts found.</td></tr>`;
      return;
    }

    tbody.innerHTML = posts.map(p => {
      const classes = [
        p.likes_increased ? "likes-increased" : "",
        p.flagged_for_phantombuster ? "flagged" : "",
      ].filter(Boolean).join(" ");

      const btnClass = p.flagged_for_phantombuster ? "btn-flag active" : "btn-flag";
      const btnLabel = p.flagged_for_phantombuster ? "Flagged ✓" : "Flag";

      const date = p.posted_date ? p.posted_date.slice(0, 10) : "—";
      const text = p.post_text || "";

      return `
        <tr class="${classes}" data-id="${p.id}">
          <td>
            <span class="tag tag-company">${esc(p.company_name)}</span>
            ${p.first_scraped_at === p.last_scraped_at ? '<span class="tag tag-new">New</span>' : ''}
          </td>
          <td>${p.image_url ? `<img class="post-img" src="${esc(p.image_url)}" alt="" onerror="this.style.display='none'" onclick="openLightbox('${esc(p.image_url)}')">` : "—"}</td>
          <td>
            <div class="post-text" title="${esc(text)}" onclick="this.classList.toggle('expanded')">
              ${esc(text.slice(0, 150))}${text.length > 150 ? "…" : ""}
            </div>
          </td>
          <td>${esc(date)}</td>
          <td>${p.likes ?? 0}</td>
          <td>${p.comments ?? 0}</td>
          <td>${wowCell(p)}</td>
          <td>
            ${p.post_url ? `<a class="linkedin-link" href="${esc(p.post_url)}" target="_blank" rel="noopener">View →</a>` : "—"}
          </td>
          <td>
            <button class="${btnClass}" onclick="toggleFlag(${p.id}, this)">${btnLabel}</button>
          </td>
        </tr>`;
    }).join("");
  }

  async function toggleFlag(postId, btn) {
    btn.disabled = true;
    await fetch(`/api/flag/${postId}`, { method: "POST" });
    const post = allPosts.find(p => p.id === postId);
    if (post) {
      post.flagged_for_phantombuster = post.flagged_for_phantombuster ? 0 : 1;
    }
    renderStats();
    renderTable();
  }

  function esc(str) {
    if (!str) return "";
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // Sort on header click
  document.querySelectorAll("th[data-col]").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if (sortCol === col) { sortDir *= -1; }
      else { sortCol = col; sortDir = -1; }
      renderTable();
    });
  });

  // Filter controls
  ["search", "filter-company", "filter-flag"].forEach(id => {
    document.getElementById(id).addEventListener("input", renderTable);
  });

  function openLightbox(url) {
    document.getElementById("lightbox-img").src = url;
    document.getElementById("lightbox").classList.add("open");
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
  }

  document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });

  loadPosts();
</script>
</body>
</html>
